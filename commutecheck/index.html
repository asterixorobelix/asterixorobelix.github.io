.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:color-mix(in srgb, var(--bg) 80%, transparent);border-bottom:1px solid var(--outline-variant)}

.btn-primary{background:var(--primary);color:var(--on-primary);border-color:var(--primary)}

.btn-outline{background:transparent;color:var(--on-bg);border-color:var(--outline-variant)}

.chip.delayed{color:var(--delayed);background:var(--delayed-container);border-color:transparent}
.chip.cancelled{color:var(--cancelled);background:var(--cancelled-container);border-color:transparent}
.chip.primary{color:var(--on-primary-container);background:var(--primary-container);border-color:transparent}

.hero-eyebrow .pulse{width:8px;height:8px;border-radius:999px;background:var(--on-time);box-shadow:0 0 0 0 color-mix(in srgb,var(--on-time) 60%, transparent);animation:pulse 2s infinite}

.device-screen{width:100%;height:100%;border-radius:38px;overflow:hidden;background:#1A1714;position:relative}
.device-screen img{width:100%;height:100%;object-fit:cover;object-position:top}

section{padding:72px 0;position:relative}

.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;margin-bottom:48px;flex-wrap:wrap}
.section-head h2{margin:0;font-weight:300;letter-spacing:-0.02em;max-width:720px}
.section-head h2 em{font-style:normal;font-weight:600;color:var(--primary)}
.section-head p{color:var(--on-surface-variant);max-width:420px;margin:0;font-size:16px;line-height:1.55}
.kicker{display:inline-block;padding:4px 10px;border-radius:999px;background:var(--primary-container);color:var(--on-primary-container);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px}

.line-wrap{background:var(--surface);border:var(--border) solid var(--outline-variant);border-radius:var(--r-xl);padding:32px;overflow-x:auto}
.line{position:relative;min-width:980px;height:220px}
.line-bar{position:absolute;left:0;right:0;top:90px;height:4px;background:var(--primary);border-radius:2px;opacity:.7}
.line-stop{position:absolute;top:80px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.line-stop .dot{width:24px;height:24px;border-radius:999px;background:var(--surface);border:3px solid var(--primary);position:relative;z-index:2;transition:transform .2s}
.line-stop:hover .dot{transform:scale(1.25)}
.line-stop.status-delayed .dot{border-color:var(--delayed)}
.line-stop.status-cancelled .dot{border-color:var(--cancelled)}
.line-stop.highlight .dot{background:var(--primary);box-shadow:0 0 0 6px color-mix(in srgb,var(--primary) 25%,transparent)}
.line-stop .label{font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--on-surface-variant);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;position:absolute;top:-80px;left:50%;margin-left:-6px}
.line-stop .code{font-size:10px;font-weight:600;color:var(--on-surface-variant);font-variant-numeric:tabular-nums;position:absolute;top:120px;left:50%;transform:translateX(-50%)}
.line-endpoints{display:flex;justify-content:space-between;margin-bottom:18px;color:var(--on-surface-variant);font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase}

.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.feature{background:var(--surface);border:var(--border) solid var(--outline-variant);border-radius:var(--r-lg);padding:28px;display:flex;flex-direction:column;gap:16px;transition:border-color .2s, transform .2s}
.feature:hover{border-color:var(--primary);transform:translateY(-2px)}
.feature-icon{width:48px;height:48px;border-radius:var(--r-md);background:var(--primary-container);color:var(--on-primary-container);display:grid;place-items:center}
.feature h3{margin:0;font-size:20px;font-weight:600;letter-spacing:-0.01em}
.feature p{margin:0;color:var(--on-surface-variant);font-size:14px;line-height:1.55}
.feature:nth-child(2) .feature-icon{background:var(--secondary-container);color:var(--on-secondary-container)}
.feature:nth-child(3) .feature-icon{background:var(--tertiary-container);color:var(--on-tertiary-container)}
.feature:nth-child(4) .feature-icon{background:var(--on-time-container);color:var(--on-time)}

.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;counter-reset:step}
.step{counter-increment:step;display:flex;flex-direction:column;gap:16px}
.step-num{font-size:64px;font-weight:300;line-height:1;color:var(--primary);letter-spacing:-0.04em;font-variant-numeric:tabular-nums}
.step h3{margin:0;font-size:20px;font-weight:600}
.step p{margin:0;color:var(--on-surface-variant);font-size:14px;line-height:1.55}

.feed-grid{display:grid;grid-template-columns:1fr;gap:32px;align-items:center}

.report-card{display:flex;gap:14px;padding:16px;border:1px solid var(--outline-variant);border-radius:var(--r-md);background:var(--surface);transition:border-color .2s}
.report-card.new{border-color:var(--primary);animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.report-avatar{width:40px;height:40px;border-radius:999px;background:var(--surface-variant);color:var(--on-surface-variant);display:grid;place-items:center;font-weight:600;font-size:13px;flex-shrink:0}
.report-meta{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.report-meta .name{font-size:13px;font-weight:600}
.report-meta .when{font-size:11px;color:var(--on-surface-variant);letter-spacing:0.05em;text-transform:uppercase}
.report-text{font-size:14px;line-height:1.45;margin:0 0 8px}
.report-tags{display:flex;gap:6px;flex-wrap:wrap}

.showcase{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;align-items:start}
.screen-item{display:flex;flex-direction:column;gap:16px}
.screen-item .device{max-width:300px}
.screen-caption{text-align:center;max-width:300px;margin:0 auto}
.screen-caption .label-md{color:var(--primary);margin-bottom:6px;display:block}
.screen-caption h3{margin:0 0 6px;font-size:20px;font-weight:600}
.screen-caption p{margin:0;color:var(--on-surface-variant);font-size:13px;line-height:1.5}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--outline-variant);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--outline-variant)}
.stat{background:var(--surface);padding:32px 28px}
.stat .n{font-size:48px;font-weight:300;letter-spacing:-0.03em;line-height:1;color:var(--primary);font-variant-numeric:tabular-nums}
.stat .l{margin-top:10px;font-size:13px;color:var(--on-surface-variant);letter-spacing:0.04em;text-transform:uppercase;font-weight:600}

.cta{background:var(--primary-container);color:var(--on-primary-container);border-radius:var(--r-xl);padding:56px 40px;text-align:center;position:relative;overflow:hidden}
.cta h2{margin:0 0 16px;font-weight:300;letter-spacing:-0.02em;font-size:clamp(32px,5vw,56px)}
.cta p{margin:0 auto 28px;max-width:560px;font-size:16px;line-height:1.55;opacity:.85}
.store-badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.store-badge{display:inline-flex;align-items:center;gap:12px;padding:10px 20px;background:#000;color:#fff;border-radius:12px;text-decoration:none;min-width:180px;height:60px;transition:transform .15s}
.store-badge:hover{transform:translateY(-2px)}
.store-badge .small{font-size:10px;opacity:.8;letter-spacing:0.05em;text-transform:uppercase;line-height:1}
.store-badge .big{font-size:18px;font-weight:600;line-height:1.1}

footer{padding:48px 0 32px;border-top:1px solid var(--outline-variant);color:var(--on-surface-variant);font-size:13px}
.foot-row{display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap}

.sr{position:absolute;left:-9999px}

    case "clock": return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case "alert": return <svg {...common}><path d="M10.3 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.7 3.86a2 2 0 00-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>;
    case "users": return <svg {...common}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>;
    case "pin": return <svg {...common}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>;
    case "bell": return <svg {...common}><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>;
    case "arrow": return <svg {...common}><path d="M5 12h14M12 5l7 7-7 7"/></svg>;
    case "wifi-off": return <svg {...common}><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/><path d="M5 12.55a10.94 10.94 0 015.17-2.39"/><path d="M10.71 5.05A16 16 0 0122.58 9"/><path d="M1.42 9a15.91 15.91 0 014.7-2.88"/><path d="M8.53 16.11a6 6 0 016.95 0"/><path d="M12 20h.01"/></svg>;
    case "apple": return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>;
    case "play": return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M3 3.5v17c0 .57.47 1 1 1 .18 0 .35-.05.5-.14l13-8.5a1 1 0 000-1.72l-13-8.5A1 1 0 003 3.5z"/></svg>;
    default: return null;
  }
};

const CommunityFeed = () => {
  const [feed, setFeed] = useState(FEED_INITIAL);
  const [nextIdx, setNextIdx] = useState(0);
  useEffect(()=>{
    const t = setInterval(()=>{
      setFeed(prev=>{
        const add = NEW_REPORTS[nextIdx % NEW_REPORTS.length];
        setNextIdx(i=>i+1);
        const newItem = {...add, id: Date.now()+Math.random(), isNew:true};
        const next = [newItem, ...prev].slice(0,4);
        return next;
      });
    }, 4200);
    return ()=>clearInterval(t);
  },[nextIdx]);

  return (
    <section id="community" style={{background:"var(--bg-deep)"}}>
      <div className="container">
        <div className="section-head">
          <div>
            <span className="kicker">Live community feed</span>
            <h2 className="display-md">Reports from <em>the platform</em>, not a press office.</h2>
          </div>
          <p>Hundreds of regulars post daily. Every report is timestamped, geotagged and tied to a station so you know exactly where it's coming from.</p>
        </div>
        <div className="feed-grid">
          <div>
            <div style={{display:"grid",gap:10}}>
              {feed.map((r,i)=>(
                <div key={r.id} className={`report-card ${r.isNew?"new":""}`}>
                  <div className="report-avatar">{r.who}</div>
                  <div style={{minWidth:0,flex:1}}>
                    <div className="report-meta">
                      <span className="name">{r.name}</span>
                      <span style={{color:"var(--on-surface-variant)"}}>·</span>
                      <span className="when">{r.when}</span>
                    </div>
                    <p className="report-text">{r.text}</p>
                    <div className="report-tags">
                      <Chip>{r.station}</Chip>
                      <Chip tone={r.tag} dot>{r.tag==="on-time"?"On time":r.tag==="delayed"?"Delayed":"Cancelled"}</Chip>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="card" style={{padding:32}}>
              <span className="label-md" style={{color:"var(--on-surface-variant)",marginBottom:12,display:"block"}}>Report in 2 taps</span>
              <h3 className="headline-md" style={{margin:"0 0 16px"}}>See something? Say something.</h3>
              <p style={{color:"var(--on-surface-variant)",margin:"0 0 24px",fontSize:15,lineHeight:1.55}}>A single screen, three buttons. On time, delayed, or cancelled — optionally add a note. Your report lands in fellow commuters' feeds in under a second.</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
                <div className="card-sm" style={{background:"var(--on-time-container)",border:"none",color:"var(--on-time)",textAlign:"center",padding:"18px 8px"}}>
                  <Icon name="check" size={20}/>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:8}}>On time</div>
                </div>
                <div className="card-sm" style={{background:"var(--delayed-container)",border:"none",color:"var(--delayed)",textAlign:"center",padding:"18px 8px"}}>
                  <Icon name="clock" size={20}/>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:8}}>Delayed</div>
                </div>
                <div className="card-sm" style={{background:"var(--cancelled-container)",border:"none",color:"var(--cancelled)",textAlign:"center",padding:"18px 8px"}}>
                  <Icon name="alert" size={20}/>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:8}}>Cancelled</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,color:"var(--on-surface-variant)",fontSize:13}}>
                <Icon name="wifi-off" size={14}/> Works even on a weak signal

        </div>
      </div>
    </section>
  );
